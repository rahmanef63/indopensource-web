name: Sync content data

# Refreshes the committed content snapshots (projects.json, blog-posts.json)
# from their upstream sources and commits any drift back to the branch.
#
# This workflow only syncs and commits data. It does NOT deploy: publishing is
# owned solely by the "Deploy to GitHub Pages" workflow (PERF-7 / CQ-13). The
# commit pushed here triggers that deploy on its own, so duplicating the Pages
# build+deploy steps inside this job only created a second concurrent deploy
# racing the first. Those steps (Setup Pages, upload-pages-artifact,
# deploy-pages) and the `pages: write` / `id-token: write` permissions have
# been removed accordingly.
on:
  workflow_dispatch:
    inputs:
      target:
        description: Content source to sync
        required: true
        default: all
        type: choice
        options:
          - all
          - projects
          - blog
  # Upstream runs this on a schedule to keep content fresh. Every six hours
  # ("17 */6 * * *") is far more often than community content changes and
  # quietly burns Actions minutes (PERF-5 / PERF-6), so the cadence is reduced
  # to once daily. A personal fork can comment this `schedule` block out
  # entirely and rely on `workflow_dispatch` / `repository_dispatch`.
  schedule:
    - cron: "17 6 * * *"
  repository_dispatch:
    types:
      - sync-projects
      - sync-blog
      - sync-content

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-content-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve sync target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TYPE: ${{ github.event.action }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          target="${INPUT_TARGET:-all}"
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$DISPATCH_TYPE" in
              sync-projects) target="projects" ;;
              sync-blog) target="blog" ;;
              sync-content) target="all" ;;
            esac
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Sync projects
        if: ${{ steps.target.outputs.target == 'all' || steps.target.outputs.target == 'projects' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:projects

      - name: Sync blog
        if: ${{ steps.target.outputs.target == 'all' || steps.target.outputs.target == 'blog' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:blog

      - name: Validate build
        env:
          ASTRO_BASE: /
        run: npm run build

      - name: Commit synced data
        id: commit
        run: |
          if git diff --quiet -- src/data/projects.json src/data/blog-posts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json src/data/blog-posts.json
          git commit -m "Sync content data"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced data
        if: ${{ steps.commit.outputs.changed == 'true' }}
        # Pushing here is enough: the Deploy to GitHub Pages workflow handles
        # publishing the new snapshot. This job intentionally stops at push.
        run: git push
