name: Sync content data

on:
  workflow_dispatch:
    inputs:
      target:
        description: Content source to sync
        required: true
        default: all
        type: choice
        options:
          - all
          - projects
          - blog
  schedule:
    - cron: "17 */6 * * *"
  repository_dispatch:
    types:
      - sync-projects
      - sync-blog
      - sync-content

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-content-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Resolve sync target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TYPE: ${{ github.event.action }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          target="${INPUT_TARGET:-all}"
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            case "$DISPATCH_TYPE" in
              sync-projects) target="projects" ;;
              sync-blog) target="blog" ;;
              sync-content) target="all" ;;
            esac
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Sync projects
        if: ${{ steps.target.outputs.target == 'all' || steps.target.outputs.target == 'projects' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:projects

      - name: Sync blog
        if: ${{ steps.target.outputs.target == 'all' || steps.target.outputs.target == 'blog' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:blog

      - name: Validate build
        env:
          ASTRO_BASE: /
        run: npm run build

      - name: Commit synced data
        id: commit
        run: |
          if git diff --quiet -- src/data/projects.json src/data/blog-posts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json src/data/blog-posts.json
          git commit -m "Sync content data"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced data
        if: ${{ steps.commit.outputs.changed == 'true' }}
        run: git push

      - name: Upload Pages artifact
        if: ${{ steps.commit.outputs.changed == 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy synced data to GitHub Pages
        if: ${{ steps.commit.outputs.changed == 'true' && github.ref == 'refs/heads/main' }}
        id: deployment
        uses: actions/deploy-pages@v5
