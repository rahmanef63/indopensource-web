name: Deploy to GitHub Pages

# This is the single source of truth for publishing the site to GitHub Pages.
# No other workflow should build-and-deploy Pages; keeping deploys in one job
# avoids concurrent deploys racing for the `pages` environment (PERF-7).
#
# Upstream (indopensource.org) deploys automatically on every push to main:
#
#   on:
#     push:
#       branches:
#         - main
#     workflow_dispatch:
#
# Fork note: a personal fork that hosts the site elsewhere (e.g. Vercel) does
# not need GitHub Pages and should not spend Actions minutes auto-deploying it
# on every push. We therefore expose `workflow_dispatch` only — the job still
# exists and works (run it manually if you ever want a Pages build), but it
# never fires on push. Re-add the `push: main` trigger above to restore the
# upstream auto-deploy behaviour.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          ASTRO_BASE: /
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
